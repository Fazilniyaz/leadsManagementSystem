services:
  mongo:
    image: mongo:7
    container_name: leads_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - leads_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leads_backend
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGO_URI: mongodb+srv://<username>:<password>@cluster0.d3daga3.mongodb.net/?appName=Cluster0
      ACCESS_TOKEN_SECRET: localsecret_access_123
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_SECRET: localsecret_refresh_456
      REFRESH_TOKEN_EXPIRES_IN: 7d
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - leads_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leads_frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
    networks:
      - leads_net

volumes:
  mongo_data:

networks:
  leads_net:
    driver: bridge
    
    
    